# XcodeGen project definition
# Edit this file, then run: cd App && xcodegen generate
# Never commit the generated .xcodeproj file.
#
# Placeholder reference:
#   Synaesthetic          → PascalCase target name (e.g. WeatherNow)
#   Synaesthetic  → Display name on device (e.g. Weather Now)
#   com.eouw0o83hf.synaesthetic         → Full bundle ID (e.g. com.acme.weathernow)
#   com.eouw0o83hf    → Bundle ID prefix (e.g. com.acme)
#   5P5S5X2NJ3           → 10-char Apple Developer Team ID

name: Synaesthetic

options:
  bundleIdPrefix: com.eouw0o83hf
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  transitivelyLinkDependencies: true

# ── Swift Package Dependencies ──────────────────────────────────────────────
# Add third-party packages here. Run `xcodegen generate` after changes.
# Example:
# packages:
#   Alamofire:
#     url: https://github.com/Alamofire/Alamofire
#     from: 5.9.0
#   SDWebImageSwiftUI:
#     url: https://github.com/SDWebImage/SDWebImageSwiftUI
#     from: 3.0.0

packages: {}

# ── Global Build Settings ────────────────────────────────────────────────────
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: 5P5S5X2NJ3
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    CLANG_ENABLE_MODULES: YES
    OTHER_SWIFT_FLAGS: ""
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ENABLE_TESTABILITY: YES
      ONLY_ACTIVE_ARCH: YES
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
      ENABLE_TESTABILITY: NO

# ── Targets ──────────────────────────────────────────────────────────────────
targets:

  # ── Main App Target ──
  Synaesthetic:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Sources/Synaesthetic
        excludes:
          - "**/*.md"

    settings:
      base:
        PRODUCT_NAME: Synaesthetic
        PRODUCT_BUNDLE_IDENTIFIER: com.eouw0o83hf.synaesthetic
        INFOPLIST_FILE: Sources/Synaesthetic/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGN_STYLE: Manual
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.eouw0o83hf.synaesthetic"

    # Add Swift Package dependencies for this target here:
    dependencies: []
    # Example:
    # dependencies:
    #   - package: Alamofire
    #   - package: SDWebImageSwiftUI

    scheme:
      testTargets:
        - SynaestheticTests
        - SynaestheticUITests
      environmentVariables:
        SWIFT_DETERMINISTIC_HASHING: "1"

  # ── Unit Test Target ──
  SynaestheticTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Tests/SynaestheticTests

    dependencies:
      - target: Synaesthetic

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eouw0o83hf.synaesthetic.tests
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG TESTING

  # ── UI Test Target ──
  SynaestheticUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: UITests/SynaestheticUITests

    dependencies:
      - target: Synaesthetic

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eouw0o83hf.synaesthetic.uitests
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG UITESTING
