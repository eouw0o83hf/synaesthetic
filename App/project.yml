# XcodeGen project definition
# Edit this file, then run: cd App && xcodegen generate
# Never commit the generated .xcodeproj file.
#
# Placeholder reference:
#   __APP_NAME__          → PascalCase target name (e.g. WeatherNow)
#   __APP_DISPLAY_NAME__  → Display name on device (e.g. Weather Now)
#   __BUNDLE_ID__         → Full bundle ID (e.g. com.acme.weathernow)
#   __ORG_IDENTIFIER__    → Bundle ID prefix (e.g. com.acme)
#   __TEAM_ID__           → 10-char Apple Developer Team ID

name: __APP_NAME__

options:
  bundleIdPrefix: __ORG_IDENTIFIER__
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  transitivelyLinkDependencies: true

# ── Swift Package Dependencies ──────────────────────────────────────────────
# Add third-party packages here. Run `xcodegen generate` after changes.
# Example:
# packages:
#   Alamofire:
#     url: https://github.com/Alamofire/Alamofire
#     from: 5.9.0
#   SDWebImageSwiftUI:
#     url: https://github.com/SDWebImage/SDWebImageSwiftUI
#     from: 3.0.0

packages: {}

# ── Global Build Settings ────────────────────────────────────────────────────
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: __TEAM_ID__
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    CLANG_ENABLE_MODULES: YES
    OTHER_SWIFT_FLAGS: ""
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ENABLE_TESTABILITY: YES
      ONLY_ACTIVE_ARCH: YES
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
      ENABLE_TESTABILITY: NO

# ── Targets ──────────────────────────────────────────────────────────────────
targets:

  # ── Main App Target ──
  __APP_NAME__:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Sources/__APP_NAME__
        excludes:
          - "**/*.md"

    settings:
      base:
        PRODUCT_NAME: __APP_DISPLAY_NAME__
        PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__
        INFOPLIST_FILE: Sources/__APP_NAME__/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGN_STYLE: Manual
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore __BUNDLE_ID__"

    # Add Swift Package dependencies for this target here:
    dependencies: []
    # Example:
    # dependencies:
    #   - package: Alamofire
    #   - package: SDWebImageSwiftUI

    scheme:
      testTargets:
        - __APP_NAME__Tests
        - __APP_NAME__UITests
      environmentVariables:
        SWIFT_DETERMINISTIC_HASHING: "1"

  # ── Unit Test Target ──
  __APP_NAME__Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Tests/__APP_NAME__Tests

    dependencies:
      - target: __APP_NAME__

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__.tests
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG TESTING

  # ── UI Test Target ──
  __APP_NAME__UITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: UITests/__APP_NAME__UITests

    dependencies:
      - target: __APP_NAME__

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__.uitests
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG UITESTING
