name: Release to TestFlight

# Triggers on version tags like: v1.0.0, v1.2.3
# Also triggers after a successful tag workflow run
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_run:
    workflows: ["Tag"]
    types: [completed]

env:
  RUBY_VERSION: "3.3"

jobs:
  release:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for build number strategy

      - name: Extract version from tag
        id: version
        run: |
          # When triggered by workflow_run, fetch latest tag; otherwise use GITHUB_REF_NAME
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          else
            TAG=${{ github.ref_name }}
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications | grep -E "^Xcode_[0-9]" | sort -rV | head -1 | sed 's/\.app//')
          sudo xcode-select -s /Applications/$LATEST.app
          xcodebuild -version

      - name: Set up Ruby ${{ env.RUBY_VERSION }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install SSH key for match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &>/dev/null; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: |
          cd App
          xcodegen generate

      - name: Create temporary keychain
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Build and upload to TestFlight
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane beta

      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - name: Upload IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.ref_name }}
          path: build/*.ipa
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Version ${{ steps.version.outputs.version }}"
          body: |
            ## Release ${{ steps.version.outputs.version }}

            This build has been uploaded to TestFlight for internal testing.

            To install: open the TestFlight app on your device.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
