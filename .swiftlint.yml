included:
  - App/Sources

excluded:
  - App/Tests
  - App/UITests
  - App/.build
  - App/.swiftpm
  - Pods

disabled_rules:
  - trailing_whitespace   # swiftformat handles this
  - todo                  # allow TODO comments during development

opt_in_rules:
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_none_name
  - empty_collection_literal
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - file_name_no_space
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - optional_enum_case_matching
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - return_value_from_void_function
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - yoda_condition

analyzer_rules:
  - unused_declaration
  - unused_import
  - explicit_self

# Thresholds
line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k

custom_rules:
  no_print_in_release:
    name: "No print() in release code"
    regex: '^\s*print\('
    message: "Use a logging framework instead of print() in production code."
    severity: warning
